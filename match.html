    <link rel="icon" type="image/png" href="images/Logo/favicon.png">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/match.css">
</head>

<body>

<!-- =========================================================
     HEADER (SAME AS HOME)
========================================================= -->

<header class="header">

    <div class="container header-container">

        <a href="index.html" class="logo">
            AMP LIVE
        </a>

        <nav class="navbar">

            <ul class="nav-links">

                <li><a href="index.html">Home</a></li>

                <li><a href="index.html">World Cup</a></li>

                <li class="dropdown">

                    <button class="dropdown-toggle">About</button>

                    <ul class="dropdown-menu">

                        <li><a href="404.html">About Us</a></li>
                        <li><a href="404.html">Community</a></li>
                        <li><a href="404.html">Contact</a></li>
                        <li><a href="disclaimer.html">Disclaimer</a></li>

                    </ul>

                </li>

            </ul>

        </nav>

        <div class="header-actions">

            <button id="themeToggle" class="theme-toggle">🌙</button>
            <button id="menuToggle" class="menu-toggle">☰</button>

        </div>

    </div>

</header>

<!-- =========================================================
     MATCH DETAILS SECTION
========================================================= -->

<main>

    <section class="match-details">

        <div class="container">

            <!-- Teams Header -->

            <div class="match-header">

                <div class="team-block">

    <img id="teamAFlag" class="team-logo-large">

    <h2 id="teamA">Team A</h2>

</div>

                <div class="match-middle">

    <div id="matchScore" class="match-score"></div>

    <div id="matchStatus" class="status-badge"></div>

</div>

                <div class="team-block">

    <img id="teamBFlag" class="team-logo-large">

    <h2 id="teamB">Team B</h2>

</div>
            </div>

            <!-- Match Info -->

            <div class="match-info">

                <p><strong>Competition:</strong> <span id="competition">-</span></p>
                <p><strong>Group:</strong> <span id="group">-</span></p>
                <p><strong>Stadium:</strong> <span id="stadium">-</span></p>
                <p><strong>Date:</strong> <span id="date">-</span></p>
                <p><strong>Time:</strong> <span id="time">-</span></p>

            </div>

            <!-- Broadcasters -->

            <div class="broadcasters">

                <h3>Official Broadcasters</h3>

                <table>
                    <tr>
                        <td>India</td>
                        <td>-</td>
                    </tr>
                    <tr>
                        <td>UK</td>
                        <td>-</td>
                    </tr>
                    <tr>
                        <td>USA</td>
                        <td>-</td>
                    </tr>
                </table>

            </div>

            <!-- Lineups -->

            <div class="lineups">

                <h3>Lineups</h3>

                <p id="lineupsText">Lineups not published.</p>

            </div>

            <!-- Stream Buttons -->

            <div class="streams">

                <a href="watch.html" class="stream-btn">Live 1</a>
                <a href="watch.html" class="stream-btn">Live 2</a>
                <a href="watch.html" class="stream-btn">Live 3</a>
                <a href="watch.html" class="stream-btn">Live 4</a>
                <a href="watch.html" class="stream-btn">Live 5</a>
                <a href="https://whatsapp.com/channel/0029Vb8UrZcE50Uo1ylsQP2w" class="stream-btn special">Live 6</a>

            </div>

        </div>

    </section>

</main>

 <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

</html>
